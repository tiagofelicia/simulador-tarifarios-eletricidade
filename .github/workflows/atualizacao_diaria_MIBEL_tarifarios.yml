# Nome descritivo do workflow
name: Atualizar MIBEL em Tarifários (Fase 1 e 2)

on:
  schedule:
    # === GRUPO 1: Manhã (Todos os dias) ===
    # Horário VERÃO (WEST=UTC+1) -> 11:55, 12:10 (Local)
    #- cron: '55 10 * * *'
    #- cron: '10 11 * * *'
    # Horário INVERNO (WET=UTC+0) -> 11:55, 12:10 (Local)
    - cron: '55 11 * * *'
    - cron: '10 12 * * *'

    # === GRUPO 2: Tarde (Seg-Sex) ===
    # Horário VERÃO (WEST=UTC+1) -> 19:00 (Local)
    #- cron: '00 18 * * 1-5'
    # Horário INVERNO (WET=UTC+0) -> 19:00 (Local)
    - cron: '00 19 * * 1-5'

  workflow_dispatch: # Permite execução manual
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  run-python-job:
    name: Executar Atualização MIBEL em Tarifários
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para fazer commit das alterações

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # --- CONFIGURAÇÃO DO AMBIENTE PYTHON ---
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- CACHE E INSTALAÇÃO DE DEPENDÊNCIAS PYTHON ---
      - name: Cache das dependências Python
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Existe um requirements_atualizar_MIBEL_tarifarios.txt com pandas, numpy, requests, openpyxl
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements_atualizar_MIBEL_tarifarios.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_atualizar_MIBEL_tarifarios.txt

      # =========================================================
      # 4. EXECUTAR FASE 1 (Com Logging)
      # =========================================================
      - name: Executar Fase 1 (atualizar_mibel_ano_atual_ACUM.py)
        run: |
          mkdir -p logs
          echo "=== FASE 1 (MIBEL CSV) INICIADA: $(date) ===" >> logs/tarifarios_atualizacao.log
          python scripts/atualizar_mibel_ano_atual_ACUM.py >> logs/tarifarios_atualizacao.log 2>&1
          echo "=== FASE 1 (MIBEL CSV) TERMINADA: $(date) ===" >> logs/tarifarios_atualizacao.log

      # =========================================================
      # 5. COMMIT FASE 1 (A Fonte de Dados)
      # =========================================================
      - name: Fazer commit do MIBEL_ano_atual_ACUM.csv
        id: commit_fase1 # ID CRÍTICO para os passos seguintes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "BOT: Atualização (Fase 1) MIBEL_ano_atual_ACUM.csv"
          file_pattern: "data/MIBEL_ano_atual_ACUM.csv"

      # =========================================================
      # 6. EXECUTAR FASE 2 (SEMPRE - Independente da Fase 1)
      # =========================================================
      - name: Executar Fase 2 (atualizar_MIBEL_tarifarios.py)
        run: |
          echo "=== FASE 2 (TARIFÁRIOS) INICIADA: $(date) ===" >> logs/tarifarios_atualizacao.log
          python scripts/atualizar_MIBEL_tarifarios.py >> logs/tarifarios_atualizacao.log 2>&1
          echo "=== FASE 2 (TARIFÁRIOS) TERMINADA: $(date) ===" >> logs/tarifarios_atualizacao.log
      
      # =========================================================
      # 7. COMMIT FASE 2 (Ficheiro Excel e Log)
      # =========================================================
      - name: Fazer commit dos ficheiros da Fase 2 (Excel e Log)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔌 BOT: Atualização MIBEL em Tarifarios e Log"
          # Este padrão apanha tanto o Excel como o Log. 
          # Se só o Log mudar, faz commit do Log. Se ambos mudarem, faz commit de ambos.
          file_pattern: "Tarifarios_🔌_Eletricidade_Tiago_Felicia.xlsx data/csv/*.csv data/csv/manifest.json logs/tarifarios_atualizacao.log"

      # =========================================================
      # 9. UPLOAD DO ARTEFACTO
      # =========================================================
      - name: Fazer upload do log como artefacto
        if: always() # Corre sempre
        uses: actions/upload-artifact@v4
        with:
          name: log-atualizacao-tarifarios
          path: logs/tarifarios_atualizacao.log
          
      # =========================================================
      # 10. 🚀 ENVIAR PARA O HUGGING FACE (Deploy - Versão Robusta)
      # =========================================================
      - name: Enviar ficheiro para o Hugging Face
        # O script abaixo já tem proteção (|| echo "Sem alterações") para não falhar se o ficheiro for igual.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          FICHEIRO_EXCEL="Tarifarios_🔌_Eletricidade_Tiago_Felicia.xlsx"
          REPO_HF="tiagofelicia/simulador-tarifarios-eletricidade"
          
          echo "Clonando o repositório $REPO_HF..."
          
          # 1. Instalar Git LFS
          sudo apt-get update
          sudo apt-get install git-lfs
          git lfs install

          # 2. Clonar o repositório do Hugging Face para uma pasta separada
          git clone --depth 1 https://user:$HF_TOKEN@huggingface.co/spaces/$REPO_HF hf_repo

          # 3. Copiar o ficheiro Excel ATUALIZADO (que está na pasta do GitHub)
          cp -f "$FICHEIRO_EXCEL" hf_repo/

          # 3b. Copiar os CSVs individuais das abas
          mkdir -p hf_repo/data/csv
          cp -f data/csv/*.csv hf_repo/data/csv/
          cp -f data/csv/manifest.json hf_repo/data/csv/

          # 4. Entrar na pasta do Hugging Face e configurar/commitar
          cd hf_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Garantir o rastreio LFS e adicionar o ficheiro
          git lfs track "*.xlsx"
          git add .gitattributes
          git add "$FICHEIRO_EXCEL"
          git add data/csv/
          
          # Commit e Push (o || echo evita que falhe se não houver diferença no Excel)
          git commit -m "🔌 HF: Atualização automática Excel + CSVs via GitHub Actions" || echo "Sem alterações para enviar"
          git push
